apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform-service-audit-trail.fullname" . }}
  labels:
    {{- include "platform-service-audit-trail.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    {{- if ne (int .Values.service.healthPort) (int .Values.service.port) }}
    - name: health
      port: {{ .Values.service.healthPort }}
      targetPort: health
      protocol: TCP
    {{- end }}
  selector:
    {{- include "platform-service-audit-trail.selectorLabels" . | nindent 4 }}