name: Sync Service Values to Consolidated Helm

on:
  push:
    branches: [main]
    paths:
      - '*/values.yaml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node.js 20 deprecation warnings

jobs:
  sync:
    name: Detect → AI Sync → PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout sparrowX-helm (this repo) — depth=2 so HEAD~1 exists for diff
      # -----------------------------------------------------------------------
      - name: Checkout sparrowX-helm
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # -----------------------------------------------------------------------
      # 2. Find which service values.yaml files were touched in this push
      # -----------------------------------------------------------------------
      - name: Detect changed services
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep -E '^[^/]+/values\.yaml$' \
            | grep -v '^\.github/')

          SERVICES=$(echo "$CHANGED" \
            | sed 's|/values\.yaml||' \
            | sort -u \
            | tr '\n' ' ' \
            | xargs || true)

          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"

          if [[ -z "$SERVICES" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No service values.yaml changes detected — workflow done."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Detected changed services: $SERVICES"
          fi

      # -----------------------------------------------------------------------
      # 3. Checkout sparrowX-deploy (consolidated chart repo) via PAT
      # -----------------------------------------------------------------------
      - name: Checkout sparrowX-deploy
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/checkout@v4
        with:
          repository: muzzamil127/sparrowX-deploy
          token: ${{ secrets.HELM_REPO_PAT }}
          ref: master
          path: deploy-consolidated

      # -----------------------------------------------------------------------
      # 4. Python env
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.detect.outputs.has_changes == 'true'
        run: pip install --quiet requests pyyaml

      # -----------------------------------------------------------------------
      # 5. AI-powered sync
      #    - Gemini detects which fields to update and maps them intelligently
      #    - Deterministic fallback runs if Gemini is rate-limited or unavailable
      #    - continue-on-error: true so diff-check always runs even on crash
      # -----------------------------------------------------------------------
      - name: AI sync (Gemini + deterministic fallback)
        if: steps.detect.outputs.has_changes == 'true'
        id: sync_script
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHANGED_SERVICES: ${{ steps.detect.outputs.services }}
          CONSOLIDATED_VALUES_PATH: deploy-consolidated/CHART/values.yaml
        run: python .github/scripts/sync_values.py

      # -----------------------------------------------------------------------
      # 6. Check if the consolidated chart was actually modified
      # -----------------------------------------------------------------------
      - name: Check consolidated chart for changes
        if: steps.detect.outputs.has_changes == 'true'
        id: deploy_diff
        run: |
          cd deploy-consolidated
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Consolidated values.yaml unchanged — no PR needed."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in consolidated chart:"
            git diff --stat
          fi

      # -----------------------------------------------------------------------
      # 7. Commit + push + open PR in sparrowX-deploy
      # -----------------------------------------------------------------------
      - name: Create PR in sparrowX-deploy
        if: >
          steps.detect.outputs.has_changes == 'true' &&
          steps.deploy_diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.HELM_REPO_PAT }}
        run: |
          set -euo pipefail
          cd deploy-consolidated

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SERVICES="${{ steps.detect.outputs.services }}"
          TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
          BRANCH="sync/values-${TIMESTAMP}"

          git checkout -b "$BRANCH"
          git add CHART/values.yaml
          git commit -m "chore: auto-sync Helm values from sparrowX-helm

          Services : ${SERVICES}
          Commit   : ${{ github.sha }}
          Actor    : ${{ github.actor }}"
          git push origin "$BRANCH"

          gh pr create \
            --repo muzzamil127/sparrowX-deploy \
            --base master \
            --head "$BRANCH" \
            --title "chore: auto-sync Helm values for ${SERVICES}" \
            --body "## Automated Helm Values Sync

          Auto-generated by the **sync-to-consolidated** workflow in [sparrowX-helm](https://github.com/muzzamil127/sparrowX-helm).

          ### How it works
          1. A developer pushed a change to \`values.yaml\` in sparrowX-helm.
          2. The sync script loads the old and new values via \`git show\` and diffs them.
          3. **Gemini AI** decides which changed fields map to the consolidated chart and how.
          4. If Gemini is unavailable, a deterministic fallback applies exact-name matches.
          5. YAML comments and anchor aliases (\`*ref\`) are always preserved.

          > **Please review the diff carefully before merging.**

          ---
          **Services updated:** \`${SERVICES}\`
          **Source commit:** [\`${{ github.sha }}\`](https://github.com/muzzamil127/sparrowX-helm/commit/${{ github.sha }})
          **Triggered by:** @${{ github.actor }}"

          echo "PR created on branch: $BRANCH"

      # -----------------------------------------------------------------------
      # 8. Summary (always printed, even on failure)
      # -----------------------------------------------------------------------
      - name: Sync summary
        if: always()
        run: |
          echo "=================================="
          echo "  Sync Summary"
          echo "=================================="
          echo "  Changed services  : ${{ steps.detect.outputs.services }}"
          echo "  Sync script result: ${{ steps.sync_script.outcome }}"
          echo "  Consolidated diff : ${{ steps.deploy_diff.outputs.has_changes }}"
          echo "=================================="
