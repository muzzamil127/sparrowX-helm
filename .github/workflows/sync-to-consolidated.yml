name: Sync Service Values → Consolidated Helm

# ─────────────────────────────────────────────────────────────────
# Triggers when any service values.yaml is merged into main.
# Uses Gemini AI to map the change to the consolidated chart and
# raises an auto-PR in sparrowX-helm for review.
#
# Required repository secrets (Settings → Secrets → Actions):
#   GEMINI_API_KEY   – Google Gemini API key
#   HELM_REPO_PAT    – GitHub PAT with repo scope on sparrowX-helm
# ─────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - '*/values.yaml'

jobs:
  sync:
    name: Detect → AI-Sync → PR
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Checkout deploy repo (full history for diff) ──────────
      - name: Checkout sparrowX-deploy
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ── 2. Detect which services had values.yaml changes ─────────
      - name: Detect changed services
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep -E '^[^/]+/values\.yaml$' \
            | grep -v '^\.github/')

          echo "Raw changed files:"
          echo "$CHANGED"

          SERVICES=$(echo "$CHANGED" \
            | sed 's|/values\.yaml||' \
            | sort -u \
            | tr '\n' ' ' \
            | xargs)

          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"

          if [[ -z "$SERVICES" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No service values.yaml changes found."
          else
            echo "has_changes=true"  >> "$GITHUB_OUTPUT"
            echo "Detected services: $SERVICES"
          fi

      # ── 3. Checkout the consolidated helm repo ───────────────────
      - name: Checkout sparrowX-helm
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/checkout@v4
        with:
          repository: muzzamil127/sparrowX-helm
          token: ${{ secrets.HELM_REPO_PAT }}
          path: helm-consolidated

      # ── 4. Python + Gemini SDK ───────────────────────────────────
      - name: Set up Python 3.11
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        if: steps.detect.outputs.has_changes == 'true'
        run: pip install requests ruamel.yaml

      # ── 5. AI-powered sync ───────────────────────────────────────
      - name: Run Gemini sync script
        if: steps.detect.outputs.has_changes == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHANGED_SERVICES: ${{ steps.detect.outputs.services }}
          CONSOLIDATED_VALUES_PATH: helm-consolidated/CHART/values.yaml
          GITHUB_SHA: ${{ github.sha }}
        run: python .github/scripts/sync_values.py

      # ── 6. Check if consolidated file actually changed ───────────
      - name: Check for real diff in consolidated
        if: steps.detect.outputs.has_changes == 'true'
        id: helm_diff
        run: |
          cd helm-consolidated
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Consolidated values.yaml is unchanged — no PR needed."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --stat
          fi

      # ── 7. Push branch + open PR in sparrowX-helm ────────────────
      - name: Create PR in sparrowX-helm
        if: >
          steps.detect.outputs.has_changes == 'true' &&
          steps.helm_diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.HELM_REPO_PAT }}
        run: |
          cd helm-consolidated

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SERVICES="${{ steps.detect.outputs.services }}"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH="sync/values-${TIMESTAMP}"

          git checkout -b "$BRANCH"
          git add CHART/values.yaml
          git commit -m "chore: auto-sync values from sparrowX-deploy

Services: $SERVICES
Source commit: ${{ github.sha }}"

          git push origin "$BRANCH"

          # Build service bullet list for PR body
          SERVICE_LIST=$(echo "$SERVICES" \
            | tr ' ' '\n' \
            | sed 's/^/- `/' \
            | sed 's/$/`/')

          gh pr create \
            --repo muzzamil127/sparrowX-helm \
            --base main \
            --head "$BRANCH" \
            --title "chore: auto-sync Helm values [$SERVICES]" \
            --body "## Automated Values Sync

This PR was generated by the **Sync Service Values → Consolidated Helm** workflow.

### Services Detected
${SERVICE_LIST}

### Source
| Field | Value |
|-------|-------|
| Repo | \`muzzamil127/sparrowX-deploy\` |
| Commit | \`${{ github.sha }}\` |
| Triggered at | $(date -u '+%Y-%m-%d %H:%M UTC') |

### How it works
1. Developer pushes a change to \`*/values.yaml\` in \`sparrowX-deploy\`
2. This workflow diffs the change and identifies which service was modified
3. Gemini AI maps the changed fields to their equivalents in the consolidated chart
4. Only the relevant fields are updated — anchors, comments, and unrelated values are preserved

> **Please review the diff carefully before merging.**
> The AI sync is accurate but should always be human-verified."
