name: Sync Service Values to Consolidated Helm

on:
  push:
    branches: [main]
    paths:
      - '*/values.yaml'

jobs:
  sync:
    name: Detect AI-Sync and PR
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout sparrowX-helm
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^[^/]+/values\.yaml$' | grep -v '^\.github/')
          SERVICES=$(echo "$CHANGED" | sed 's|/values\.yaml||' | sort -u | tr '\n' ' ' | xargs)
          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
          if [[ -z "$SERVICES" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Detected: $SERVICES"
          fi

      - name: Checkout sparrowX-deploy
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/checkout@v4
        with:
          repository: muzzamil127/sparrowX-deploy
          token: ${{ secrets.HELM_REPO_PAT }}
          ref: master
          path: deploy-consolidated

      - name: Set up Python 3.11
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.detect.outputs.has_changes == 'true'
        run: pip install requests

      - name: Run Gemini sync script
        if: steps.detect.outputs.has_changes == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHANGED_SERVICES: ${{ steps.detect.outputs.services }}
          CONSOLIDATED_VALUES_PATH: deploy-consolidated/CHART/values.yaml
        run: python .github/scripts/sync_values.py

      - name: Check for diff in consolidated
        if: steps.detect.outputs.has_changes == 'true'
        id: deploy_diff
        run: |
          cd deploy-consolidated
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi

      - name: Create PR in sparrowX-deploy
        if: steps.detect.outputs.has_changes == 'true' && steps.deploy_diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.HELM_REPO_PAT }}
        run: |
          cd deploy-consolidated
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SERVICES="${{ steps.detect.outputs.services }}"
          BRANCH="sync/values-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add CHART/values.yaml
          git commit -m "chore: auto-sync values from sparrowX-helm | services: $SERVICES"
          git push origin "$BRANCH"
          printf '## Automated Values Sync\n\nAuto-generated by sync workflow.\n\nServices: %s\nCommit: ${{ github.sha }}\n' "$SERVICES" > /tmp/pr-body.md
          gh pr create --repo muzzamil127/sparrowX-deploy --base master --head "$BRANCH" --title "chore: auto-sync Helm values for $SERVICES" --body-file /tmp/pr-body.md