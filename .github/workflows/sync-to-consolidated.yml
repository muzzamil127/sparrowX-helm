name: Sync Service Values to Consolidated Helm

on:
  push:
    branches: [main]
    paths:
      - '*/values.yaml'

jobs:
  sync:
    name: Detect, Sync, and PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout sparrowX-helm (this repo) with depth=2 so HEAD~1 exists
      # -----------------------------------------------------------------------
      - name: Checkout sparrowX-helm
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # -----------------------------------------------------------------------
      # 2. Detect which service values.yaml files changed
      # -----------------------------------------------------------------------
      - name: Detect changed services
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep -E '^[^/]+/values\.yaml$' \
            | grep -v '^\.github/')

          SERVICES=$(echo "$CHANGED" \
            | sed 's|/values\.yaml||' \
            | sort -u \
            | tr '\n' ' ' \
            | xargs || true)

          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"

          if [[ -z "$SERVICES" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No service values.yaml changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Detected changed services: $SERVICES"
          fi

      # -----------------------------------------------------------------------
      # 3. Checkout sparrowX-deploy (the consolidated chart repo)
      # -----------------------------------------------------------------------
      - name: Checkout sparrowX-deploy
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/checkout@v4
        with:
          repository: muzzamil127/sparrowX-deploy
          token: ${{ secrets.HELM_REPO_PAT }}
          ref: master
          path: deploy-consolidated

      # -----------------------------------------------------------------------
      # 4. Python + pip
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        if: steps.detect.outputs.has_changes == 'true'
        run: pip install --quiet requests pyyaml

      # -----------------------------------------------------------------------
      # 5. Run the sync script
      #    Primary: deterministic YAML-diff (no API needed, always works)
      #    Optional: Gemini for unmapped fields when GEMINI_API_KEY is set
      #    continue-on-error keeps the diff-check running even on unexpected crash
      # -----------------------------------------------------------------------
      - name: Run sync script
        if: steps.detect.outputs.has_changes == 'true'
        id: sync_script
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHANGED_SERVICES: ${{ steps.detect.outputs.services }}
          CONSOLIDATED_VALUES_PATH: deploy-consolidated/CHART/values.yaml
        run: python .github/scripts/sync_values.py

      # -----------------------------------------------------------------------
      # 6. Check whether the consolidated values.yaml was actually changed
      # -----------------------------------------------------------------------
      - name: Check for diff in consolidated chart
        if: steps.detect.outputs.has_changes == 'true'
        id: deploy_diff
        run: |
          cd deploy-consolidated
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Consolidated values.yaml is unchanged -- no PR needed."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in consolidated chart:"
            git diff --stat
          fi

      # -----------------------------------------------------------------------
      # 7. Commit, push, and open a PR in sparrowX-deploy
      # -----------------------------------------------------------------------
      - name: Create PR in sparrowX-deploy
        if: >
          steps.detect.outputs.has_changes == 'true' &&
          steps.deploy_diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.HELM_REPO_PAT }}
        run: |
          set -euo pipefail
          cd deploy-consolidated

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SERVICES="${{ steps.detect.outputs.services }}"
          TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
          BRANCH="sync/values-${TIMESTAMP}"

          git checkout -b "$BRANCH"
          git add CHART/values.yaml
          git commit -m "chore: auto-sync Helm values from sparrowX-helm

          Services: ${SERVICES}
          Source commit: ${{ github.sha }}"
          git push origin "$BRANCH"

          gh pr create \
            --repo muzzamil127/sparrowX-deploy \
            --base master \
            --head "$BRANCH" \
            --title "chore: auto-sync Helm values for ${SERVICES}" \
            --body "## Automated Helm Values Sync

          Auto-generated by the **sync-to-consolidated** workflow in sparrowX-helm.

          ### What happened
          1. A developer pushed a change to \`values.yaml\` in **sparrowX-helm**.
          2. The sync script detected changed fields via YAML diff (deterministic, no AI required).
          3. Common fields (image.tag, replicas, resources) were synced automatically.
          4. YAML anchors and comments are preserved.

          > Please review the diff carefully before merging.

          ---
          **Services updated:** \`${SERVICES}\`
          **Source commit:** ${{ github.sha }}
          **Triggered by:** ${{ github.actor }}"

          echo "PR created successfully for branch: $BRANCH"

      # -----------------------------------------------------------------------
      # 8. Surface the sync-script outcome as a clear summary
      # -----------------------------------------------------------------------
      - name: Report sync result
        if: always()
        run: |
          echo "=== Sync Summary ==="
          echo "Changed services  : ${{ steps.detect.outputs.services }}"
          echo "Sync script result: ${{ steps.sync_script.outcome }}"
          echo "Consolidated diff : ${{ steps.deploy_diff.outputs.has_changes }}"
