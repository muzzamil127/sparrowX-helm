name: PLAT Validate Helm Charts

on:
  pull_request:
    paths:
      - '*/Chart.yaml'
      - '*/values.yaml'
      - '*/templates/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed service folders
        id: changed
        run: |
          # Get unique top-level folders that changed in this PR
          FOLDERS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '^[^/]+/(Chart\.yaml|values\.yaml|templates/)' \
            | cut -d'/' -f1 \
            | sort -u \
            | tr '\n' ' ')
          echo "folders=${FOLDERS}" >> $GITHUB_OUTPUT
          echo "Detected changed services: ${FOLDERS}"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Lint all changed charts
        run: |
          for SERVICE in ${{ steps.changed.outputs.folders }}; do
            if [[ ! -f "${SERVICE}/Chart.yaml" ]]; then
              echo "Skipping ${SERVICE} — no Chart.yaml found"
              continue
            fi
            echo "──────────────────────────────────────"
            echo "Linting: ${SERVICE}"
            helm lint "${SERVICE}/" --strict
          done

      - name: Render all changed charts
        run: |
          > rendered.yaml
          for SERVICE in ${{ steps.changed.outputs.folders }}; do
            if [[ ! -f "${SERVICE}/Chart.yaml" ]]; then
              continue
            fi
            echo "──────────────────────────────────────"
            echo "Rendering: ${SERVICE}"
            helm template "${SERVICE}" "${SERVICE}/" \
              --set image.tag=pr-validate \
              --set imagePullSecrets[0].name=placeholder-secret \
              >> rendered.yaml
          done
          echo "Total manifests: $(grep -c '^---' rendered.yaml)"

      - name: Validate with kubeconform
        uses: docker://ghcr.io/yannh/kubeconform:latest
        with:
          entrypoint: /kubeconform
          args: >-
            -strict
            -summary
            -kubernetes-version 1.29.0
            -skip HorizontalPodAutoscaler
            /github/workspace/rendered.yaml

      - name: Post summary comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const rendered = fs.existsSync('rendered.yaml')
              ? fs.readFileSync('rendered.yaml', 'utf8').slice(0, 60000)
              : '_No manifests rendered._';

            const services = '${{ steps.changed.outputs.folders }}'.trim().split(' ').filter(Boolean);
            const serviceList = services.map(s => `- \`${s}\``).join('\n');

            const body = `## Helm Validation
            **Changed services:**
            ${serviceList}

            <details>
            <summary>Rendered manifests</summary>

            \`\`\`yaml
            ${rendered}
            \`\`\`
            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });