name: Sync Service Values to Consolidated Helm

on:
  push:
    branches: [main]
    paths:
      - '*/values.yaml'

jobs:
  sync:
    name: Detect, AI-Sync, and PR
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout sparrowX-deploy
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep -E '^[^/]+/values\.yaml$' \
            | grep -v '^\.github/')

          SERVICES=$(echo "$CHANGED" \
            | sed 's|/values\.yaml||' \
            | sort -u \
            | tr '\n' ' ' \
            | xargs)

          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"

          if [[ -z "$SERVICES" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No service values.yaml changes found."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Detected services: $SERVICES"
          fi

      - name: Checkout sparrowX-helm
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/checkout@v4
        with:
          repository: muzzamil127/sparrowX-helm
          token: ${{ secrets.HELM_REPO_PAT }}
          path: helm-consolidated

      - name: Set up Python 3.11
        if: steps.detect.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        if: steps.detect.outputs.has_changes == 'true'
        run: pip install requests

      - name: Run Gemini sync script
        if: steps.detect.outputs.has_changes == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CHANGED_SERVICES: ${{ steps.detect.outputs.services }}
          CONSOLIDATED_VALUES_PATH: helm-consolidated/CHART/values.yaml
        run: python .github/scripts/sync_values.py

      - name: Check for diff in consolidated
        if: steps.detect.outputs.has_changes == 'true'
        id: helm_diff
        run: |
          cd helm-consolidated
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Consolidated values.yaml unchanged - no PR needed."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi

      - name: Create PR in sparrowX-helm
        if: steps.detect.outputs.has_changes == 'true' && steps.helm_diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.HELM_REPO_PAT }}
        run: |
          cd helm-consolidated

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SERVICES="${{ steps.detect.outputs.services }}"
          BRANCH="sync/values-$(date +%Y%m%d-%H%M%S)"

          git checkout -b "$BRANCH"
          git add CHART/values.yaml
          git commit -m "chore: auto-sync values from sparrowX-deploy | services: $SERVICES"
          git push origin "$BRANCH"

          cat > /tmp/pr-body.md << 'PRBODY'
          ## Automated Values Sync

          Auto-generated by the sync workflow in sparrowX-deploy.

          ### What happened
          1. Developer pushed a change to values.yaml in sparrowX-deploy
          2. Gemini AI mapped the changed fields to the consolidated chart
          3. Only relevant fields were updated - anchors and comments are preserved

          > Please review the diff carefully before merging.
          PRBODY

          echo "" >> /tmp/pr-body.md
          echo "**Services updated:** $SERVICES" >> /tmp/pr-body.md
          echo "**Source commit:** ${{ github.sha }}" >> /tmp/pr-body.md

          gh pr create \
            --repo muzzamil127/sparrowX-helm \
            --base main \
            --head "$BRANCH" \
            --title "chore: auto-sync Helm values for $SERVICES" \
            --body-file /tmp/pr-body.md
