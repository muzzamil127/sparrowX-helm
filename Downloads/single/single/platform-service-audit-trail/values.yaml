# =============================================================================
# Default values for platform-service-audit-trail.
# Auto-generated by scripts/generate-helm.sh from deploy/.env.prod
# =============================================================================

replicaCount: 1

image:
  repository: devopstps/platform-service-audit-trail
  pullPolicy: IfNotPresent
  # Override with image digest or tag at deploy time, e.g. --set image.tag=sha-abc123
  tag: "v0.1.2.3.4.5"

nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Image pull secrets — name of the dockerhub-pull-secret provisioned by infra
# per namespace. The Secret itself is never committed — infra creates it.
# ---------------------------------------------------------------------------
imagePullSecrets:
  - name: dockerhub-pull-secret

service:
  type: ClusterIP
  port: 555555
  healthPort: 100000

# ---------------------------------------------------------------------------
# Dapr sidecar injection
# The Dapr operator injects the sidecar based on pod annotations below.
# ---------------------------------------------------------------------------
dapr:
  enabled: true
  appId: platform-service-audit-trail
  appPort: "8080"
  sidecarHttpPort: "3500"
  sidecarGrpcPort: "50001"
  logLevel: info
  enableApiLogging: "false"

# ---------------------------------------------------------------------------
# Service-specific ConfigMap  →  platform-service-audit-trail-config
# Source: deploy/.env.prod
# ---------------------------------------------------------------------------
config:
  APP_VERSION: "1.0.0"
  SERVER_PORT: "8080"
  HEALTH_PORT: "8080"
  LIVENESS_PROBE_PATH: "/health/live"
  READINESS_PROBE_PATH: "/health/ready"
  LIVENESS_INITIAL_DELAY: "30"
  READINESS_INITIAL_DELAY: "15"
  DAPR_SECRET_DB_PATH: "platform-service-audit-trail"
  DAPR_SECRET_KEY1: "db-connection-string-postgres"
  Dapr__SecretDbPath: "platform-service-audit-trail"
  Dapr__SecretKeyConnectionString: "db-connection-string-postgres"
  AuditDaprPubSub__AuditEventsTopic: "audit-events"
  AuditDaprPubSub__AuditEventsSubscriptionName: "audit-trail-service"

# ---------------------------------------------------------------------------
# Infra ConfigMap (pre-existing — populated by the infra namespace pipeline)
# This ConfigMap must exist in the target namespace before deploying.
# Expected keys from deploy/.env.infra:
    # - DAPR_SECRET_STORE_NAME
    # - DAPR_STATE_STORE_NAME
    # - DAPR_PUBSUB_NAME
    # - OTEL_EXPORTER_OTLP_ENDPOINT
    # - OTEL_EXPORTER_OTLP_PROTOCOL
    # - POSTGRES_PORT
    # - REDIS_PORT
    # - PROMETHEUS_PORT
    # - GRAFANA_PORT
    # - TEMPO_PORT
    # - OTEL_COLLECTOR_GRPC_PORT
    # - OTEL_COLLECTOR_HTTP_PORT
# ---------------------------------------------------------------------------
infraConfigMap:
  name: platform-infra-config

# ---------------------------------------------------------------------------
# Resource requests / limits
# ---------------------------------------------------------------------------
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# ---------------------------------------------------------------------------
# Security contexts (non-root, UID 1001 matching Dockerfile appuser)
# ---------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# ---------------------------------------------------------------------------
# Log volume  (emptyDir, matching /app/logs used by Logback)
# ---------------------------------------------------------------------------
logs:
  enabled: true
  mountPath: /app/logs

# ---------------------------------------------------------------------------
# Liveness / Readiness probes
# ---------------------------------------------------------------------------
probes:
  liveness:
    path: /health/live
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /health/ready
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

# ---------------------------------------------------------------------------
# Horizontal Pod Autoscaler
# ---------------------------------------------------------------------------
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# Atlas database migrations (managed by atlas-operator)
# atlas.enabled=true generates AtlasMigration CR (sync-wave 0)
# Requires <release-name>-db-credentials Secret in the same namespace.
# ---------------------------------------------------------------------------
atlas:
  enabled: true
